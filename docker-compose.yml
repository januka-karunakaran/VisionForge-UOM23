version: "3.9"

# =============================================================
#  CRMS — VisionForge Docker Compose
#  Usage:
#    Start:   docker-compose up -d
#    Stop:    docker-compose down
#    Logs:    docker-compose logs -f
#    Rebuild: docker-compose up -d --build
# =============================================================

services:

  # -----------------------------------------------------------
  #  Backend — Spring Boot
  # -----------------------------------------------------------
  backend:
    build:
      context: ./apps/backend/crms
      dockerfile: Dockerfile
    container_name: crms-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # MongoDB — using Atlas cloud (already in application.properties)
      # You can override any property using SPRING_ prefix:
      SPRING_DATA_MONGODB_URI: ${MONGO_URI:-mongodb+srv://sathurjanv23_db_user:TsheqPqhgj5whR0K@cluster0.1ypqtz5.mongodb.net/crms?retryWrites=true&w=majority&appName=Cluster0}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME:-sathu20030303@gmail.com}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD:-cvkzdhfmupgzufql}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-799515143551-e1j9jbunmnj8g6vdgbtfjre9d2bgrbn8.apps.googleusercontent.com}
      SERVER_PORT: 8080
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - crms-network

  # -----------------------------------------------------------
  #  Frontend — Next.js 15
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        # Backend URL that the browser calls — change to your server IP/domain
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    container_name: crms-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crms-network

# =============================================================
#  Shared network
# =============================================================
networks:
  crms-network:
    driver: bridge
